<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lux — Sign In</title>
  <script>
    (function(){ var t=localStorage.getItem('lux-theme')||'dark'; document.documentElement.setAttribute('data-theme',t); })();
  </script>
  <style>
    :root {
      --gold: #C9A227;
      --gold-hover: #b08a1a;
      --bg: #F1F3F9;
      --surface: #FFFFFF;
      --surface-2: #F4F5F9;
      --text: #111827;
      --text-2: #4B5563;
      --text-muted: #9CA3AF;
      --border: #E5E7EB;
      --input-bg: #F8F9FB;
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.10);
    }
    html[data-theme="dark"] {
      --bg: #0D0D16;
      --surface: #161622;
      --surface-2: #1E1E2E;
      --text: #F0F0F8;
      --text-2: #9090A8;
      --text-muted: #55556A;
      --border: #2A2A3E;
      --input-bg: #1E1E2E;
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.25s;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px;
      box-shadow: var(--shadow-lg);
    }
    .logo {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 10px;
      color: var(--gold);
      text-align: center;
      margin-bottom: 4px;
    }
    .tagline {
      text-align: center;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 36px;
    }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .form-control {
      width: 100%;
      padding: 11px 14px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    .form-control:focus { border-color: var(--gold); }
    .form-control::placeholder { color: var(--text-muted); }
    .btn {
      width: 100%;
      padding: 12px;
      background: var(--gold);
      color: #111;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      transition: background 0.15s, transform 0.1s;
      margin-top: 4px;
    }
    .btn:hover { background: var(--gold-hover); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: default; transform: none; }
    .error {
      background: rgba(220,38,38,0.1);
      border: 1px solid rgba(220,38,38,0.3);
      color: #DC2626;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .theme-row {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
    .theme-toggle-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 7px 18px;
      border-radius: 50px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .theme-toggle-btn:hover { border-color: var(--gold); color: var(--gold); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo">LUX</div>
      <div class="tagline">Sales Dashboard</div>

      <div class="error" id="error-msg"></div>

      <form onsubmit="doLogin(event)">
        <label class="form-label">Username</label>
        <input id="username" class="form-control" type="text" placeholder="Enter username" autocomplete="username" required>

        <label class="form-label">Password</label>
        <input id="password" class="form-control" type="password" placeholder="Enter password" autocomplete="current-password" required>

        <button class="btn" type="submit" id="login-btn">Sign In</button>
      </form>
    </div>
    <div class="theme-row">
      <button class="theme-toggle-btn" id="theme-btn" onclick="toggleLoginTheme()">🌙 Dark mode</button>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    fetch('/api/me').then(r => r.json()).then(d => {
      if (d.authenticated) window.location.href = '/';
    });

    // Update toggle button label
    (function(){
      var t = document.documentElement.getAttribute('data-theme') || 'dark';
      var btn = document.getElementById('theme-btn');
      if (btn) btn.textContent = t === 'dark' ? '☀️ Light mode' : '🌙 Dark mode';
    })();

    function toggleLoginTheme() {
      var current = document.documentElement.getAttribute('data-theme') || 'dark';
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('lux-theme', next);
      document.getElementById('theme-btn').textContent = next === 'dark' ? '☀️ Light mode' : '🌙 Dark mode';
    }

    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.textContent = 'Signing in…';
      btn.disabled = true;

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });

      if (res.ok) {
        window.location.href = '/';
      } else {
        const data = await res.json();
        const err = document.getElementById('error-msg');
        err.textContent = data.error || 'Login failed. Please try again.';
        err.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
