<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lux — Inventory</title>
  <script>
    (function(){ var t=localStorage.getItem('lux-theme')||'dark'; document.documentElement.setAttribute('data-theme',t); })();
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <h1>LUX</h1>
    <p>Sales Dashboard</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Overview</div>
    <a href="/"><span class="icon">📊</span> Dashboard</a>
    <a href="/inventory.html" class="active"><span class="icon">📦</span> Inventory</a>
    <div class="nav-section">Management</div>
    <a href="/quotes.html"><span class="icon">📋</span> Quotes</a>
    <a href="/invoices.html"><span class="icon">🧾</span> Invoices</a>
    <a href="/customers.html"><span class="icon">👥</span> Customers</a>
    <a href="/members.html"><span class="icon">⭐</span> Members</a>
  </nav>
  <div class="sidebar-footer">
    <div class="nav-section">Account</div>
    <a onclick="logout()"><span class="icon">🚪</span> Sign Out</a>
  </div>
</aside>

<div class="app-body">
  <header class="topbar">
    <div class="topbar-search">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Search products..." readonly onclick="this.blur()">
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" title="Notifications">🔔</button>
      <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      <div class="topbar-divider"></div>
      <div class="user-pill">
        <div class="user-avatar">N</div>
        <span class="user-name">Nicole</span>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">Inventory</div>
        <div class="page-subtitle">Stock levels &amp; sales by SKU</div>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Product</button>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>SKU</th><th>Style</th><th>Colour</th><th>Size</th>
              <th>Price (RM)</th><th>Stock</th><th>Total Sold</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="products-tbody">
            <tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-muted)">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Add / Edit Product Modal -->
<div class="modal-overlay" id="product-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="product-modal-title">Add Product</div>
      <button class="modal-close" onclick="closeProductModal()">×</button>
    </div>
    <form id="product-form" onsubmit="return false">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Style</label>
          <input id="p-style" class="form-control" value="Angel Wings" required>
        </div>
        <div class="form-group">
          <label class="form-label">Colour</label>
          <select id="p-color" class="form-control" required>
            <option value="黑">黑 (Black)</option>
            <option value="白">白 (White)</option>
            <option value="灰">灰 (Grey)</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Size</label>
          <select id="p-size" class="form-control" required>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="均码">均码 (Free Size)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Selling Price (RM)</label>
          <input id="p-wholesale" type="number" step="0.01" min="0" class="form-control" placeholder="e.g. 28.00" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Stock (pairs)</label>
        <input id="p-online" type="number" min="0" class="form-control" value="0">
      </div>
    </form>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeProductModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<!-- Record Sale Modal -->
<div class="modal-overlay" id="sale-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Record Sale</div>
      <button class="modal-close" onclick="closeSaleModal()">×</button>
    </div>
    <div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px" id="sale-product-name"></div>
      <div style="font-size:12px;color:var(--text-muted)">Price: <strong id="sale-unit-display"></strong></div>
    </div>
    <div class="form-group" style="margin-top:16px">
      <label class="form-label">Quantity (pairs)</label>
      <input id="s-quantity" type="number" min="1" value="1" class="form-control" oninput="updateSaleTotal()">
    </div>
    <div class="price-preview">
      <div class="row"><span>Unit Price</span><strong id="sale-unit-price-preview">—</strong></div>
      <div class="row total-row"><span>Total</span><strong id="sale-total-preview">—</strong></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeSaleModal()">Cancel</button>
      <button class="btn btn-primary" onclick="recordSale()">Record Sale</button>
    </div>
  </div>
</div>

<script src="js/theme.js"></script>
<script src="js/auth.js"></script>
<script src="js/inventory.js"></script>
</body>
</html>
